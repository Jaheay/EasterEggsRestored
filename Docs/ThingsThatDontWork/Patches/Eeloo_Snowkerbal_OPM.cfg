// Easter Egg Restored
// OPM/Eeloo compatibility for the stock Eeloo Snowkerbal.
// This relocates the existing stock City node if it is still present at patch time.

@Kopernicus:NEEDS[OPM]:FINAL
{
    @Body[Eeloo]
    {
        @PQS
        {
            @Mods
            {
                @City[Anniversary3]
                {
                    %repositionRadial = -66997.771400,92899.694425,178318.901438
                    %repositionRadiusOffset = 1935.568527
                    %repositionToSphere = True
                    %repositionToSphereSurface = False
                    %repositionToSphereSurfaceAddHeight = False
                }
            }
        }
    }
}


@Kopernicus:NEEDS[OPM]:FINAL
{
    @Body[Eeloo]
    {
        @PQS
        {
            Mods
            {
                City
                {
                    name = Anniversary3
                    debugOrientated = False
                    frameDelta = 1
                    randomizeOnSphere = False
                    reorientToSphere = True
                    reorientFinalAngle = 120
                    reorientInitialUp = 0,1,0
                    repositionRadial = -66997.771400,92899.694425,178318.901438
                    repositionRadiusOffset = 1935.568527
                    repositionToSphere = True
                    repositionToSphereSurface = False
                    repositionToSphereSurfaceAddHeight = False
                    commnetStation = False
                    isKSC = False
                    order = 100
                    enabled = True
                }
            }
        }
    }
}
