// Easter Egg Restored
// Restores Valls Icehenge/Vallhenge static to the visible surface.

@Kopernicus:AFTER[Kopernicus]
{
    @Body[Vall]
    {
        @PQS
        {
            @Mods
            {
                @City[Icehenge]
                {
                    %repositionRadial = 16296.905786,-261481.564573,149552.426329
                    %repositionRadiusOffset = 1668.901232
                    %repositionToSphere = True
                    %repositionToSphereSurface = False
                    %repositionToSphereSurfaceAddHeight = False
                }
            }
        }
    }
}

@Kopernicus:FINAL
{
    @Body[Vall]
    {
        @PQS
        {
            Mods
            {
                City
                {
                    name = Icehenge
                    debugOrientated = False
                    frameDelta = 1
                    randomizeOnSphere = False
                    reorientToSphere = True
                    reorientFinalAngle = 190
                    reorientInitialUp = 0,1,0
                    repositionRadial = 16296.905786,-261481.564573,149552.426329
                    repositionRadiusOffset = 1668.901232
                    repositionToSphere = True
                    repositionToSphereSurface = False
                    repositionToSphereSurfaceAddHeight = False
                    commnetStation = False
                    isKSC = False
                    order = 100
                    enabled = True
                }
            }
        }
    }
}
