// Easter Egg Restored
// BetterDres compatibility for the stock Dres red sports car.
// BetterDres visual terrain sits above the stock Dres car. This lifts the existing stock City node if it is still present at patch time.

@Kopernicus:NEEDS[BetterDres]:FINAL
{
    @Body[Dres]
    {
        @PQS
        {
            @Mods
            {
                @City[Anniversary6]
                {
                    %repositionRadial = 62332.502044,4875.700765,128594.722447
                    %repositionRadiusOffset = 4988.516708
                    %repositionToSphere = True
                    %repositionToSphereSurface = False
                    %repositionToSphereSurfaceAddHeight = False
                }
            }
        }
    }
}
